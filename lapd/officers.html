<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHIBA PIMS | Officers</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<!-- LAYOUT -->
<div id="layoutTop"></div>

<div class="content">

    <!-- HEADER -->
    <div class="card">

        <h1>👮 Officer Management</h1>

        <p>
            Manage personnel, ranks, permissions, and operational status.
        </p>

    </div>

    <!-- ACTION BAR -->
    <div class="card actionBar">

        <button id="createOfficerBtn">＋ Create Officer</button>

        <button>📤 Export</button>

        <button>🖨️ Print</button>

        <button>🔍 Advanced Search</button>

    </div>

    <!-- FILTER BAR -->
    <div class="card">

        <input id="searchInput" placeholder="Search officers...">

        <select>
            <option>All Status</option>
            <option>On Duty</option>
            <option>Off Duty</option>
            <option>Training</option>
            <option>Suspended</option>
        </select>

        <select>
            <option>All Ranks</option>
            <option>Officer</option>
            <option>Corporal</option>
            <option>Sergeant</option>
            <option>Lieutenant</option>
            <option>Captain</option>
        </select>

    </div>

    <!-- TABLE -->
    <div class="card">

        <table class="table">

            <thead>

                <tr>

                    <th>Status</th>
                    <th>Name</th>
                    <th>Badge ID</th>
                    <th>Rank</th>
                    <th>Division</th>
                    <th>Last Active</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="officersTable">

                <tr>

                    <td>🟢 On Duty</td>
                    <td>John Smith</td>
                    <td>SH-2026-00421</td>
                    <td>Sergeant II</td>
                    <td>Metro</td>
                    <td>Now</td>
                    <td>
                        <button>View</button>
                        <button>Edit</button>
                        <button>Promote</button>
                        <button>More</button>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- FOOTER -->
<div id="layoutFooter"></div>

<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/officers.js"></script>

<script>

document.getElementById("layoutTop").innerHTML = AppLayout.createTopbar();
document.getElementById("layoutFooter").innerHTML = AppLayout.createFooter();

</script>

</body>

</html>
