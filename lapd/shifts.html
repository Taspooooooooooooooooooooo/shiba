<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHIBA PIMS | Shifts</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div id="layoutTop"></div>

<div class="content">

    <div class="card">

        <h1><svg class="pIcon" width="24" height="24" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-shifts"></use></svg> Shifts</h1>

        <p>Your duty sessions — start one from the Dashboard, then open any
           shift here for its full record.</p>

    </div>

    <div class="card" id="shiftsActive"></div>

    <div class="card">

        <div class="calBar">
            <button id="calPrev" class="ghostBtn">←</button>
            <h2 id="calTitle" style="margin:0">Schedule</h2>
            <button id="calNext" class="ghostBtn">→</button>
            <div style="flex:1"></div>
            <button id="calSchedule" class="primaryBtn hidden">Schedule shift</button>
        </div>

        <div id="calGrid"><p class="muted">Loading…</p></div>

    </div>

    <div class="card">

        <h2>Shift history</h2>

        <div id="shiftsHistory"><p class="muted">Loading…</p></div>

    </div>

</div>

<div id="layoutFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/version.js"></script>

<script src="js/supabaseClient.js"></script>

<script src="js/core/idService.js"></script>
<script src="js/core/permissionService.js"></script>
<script src="js/core/auditService.js"></script>
<script src="js/core/timelineService.js"></script>
<script src="js/core/notificationService.js"></script>
<script src="js/core/shiftService.js"></script>

<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/commandPalette.js"></script>
<script src="js/shifts-list.js"></script>

<script>

if(localStorage.getItem("loggedIn")!="true"){

    window.location.href="index.html";

}

document.getElementById("layoutTop").innerHTML = AppLayout.createTopbar();
document.getElementById("layoutFooter").innerHTML = AppLayout.createFooter();

</script>

</body>

</html>
