<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SHIBA PIMS | Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

</head>
<body>

<div id="layoutTop"></div>

<main class="content">

    <section class="card">

        <h1>

            Welcome back!

        </h1>

        <p>

            SHIBA Police Information Management System

        </p>

    </section>

    <!-- QUICK ACTIONS -->
    <section class="card quickActions">

        <button id="qaCreateOfficer" onclick="location.href='officers.html?create=1'">＋ Create Officer</button>

        <button onclick="location.href='officers.html'"><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-search"></use></svg> Search Officers</button>

        <button onclick="location.href='../cloud/'"><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-cloud"></use></svg> Upload File</button>

    </section>

    <!-- LIVE WIDGETS -->
    <section class="grid">

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-officers"></use></svg> Officers</h3>

            <h1 id="statOfficers">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-shifts"></use></svg> On Duty</h3>

            <h1 id="statOnDuty">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-dispatch"></use></svg> Online Now</h3>

            <h1 id="statOnline">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-cases"></use></svg> Open Cases</h3>

            <h1 id="statCases">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-reports"></use></svg> Reports</h3>

            <h1 id="statReports">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-cloud"></use></svg> Cloud Files</h3>

            <h1 id="statCloud">…</h1>

        </div>

        <div class="card">

            <h3><svg class="pIcon" width="17" height="17" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-notifications"></use></svg> Unread</h3>

            <h1 id="statNotifs">…</h1>

        </div>

    </section>

    <!-- WEEKLY ACTIVITY -->
    <section class="card">

        <h2>

            <svg class="pIcon" width="20" height="20" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-analytics"></use></svg> Weekly Activity

        </h2>

        <div id="weeklyChart" class="chartBars"></div>

    </section>

    <!-- LIVE AUDIT FEED -->
    <section class="card">

        <h2>

            <svg class="pIcon" width="20" height="20" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-history"></use></svg> Live Activity

        </h2>

        <div id="activityFeed">

            <p>

                Loading...

            </p>

        </div>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/version.js"></script>

<script src="js/supabaseClient.js"></script>

<script src="js/core/idService.js"></script>
<script src="js/core/permissionService.js"></script>
<script src="js/core/auditService.js"></script>
<script src="js/core/timelineService.js"></script>
<script src="js/core/notificationService.js"></script>

<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/commandPalette.js"></script>
<script src="js/dashboard.js"></script>

<script>

if(localStorage.getItem("loggedIn")!="true"){

    window.location.href="index.html";

}

document.getElementById("layoutTop").innerHTML = AppLayout.createTopbar();

</script>

</body>

</html>
