<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHIBA PIMS | Applications</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div id="layoutTop"></div>

<div class="content">

    <div class="card">

        <h1><svg class="pIcon" width="24" height="24" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-bookings"></use></svg> Applications</h1>

        <p>Apply for special assignments — SWAT, K9, Detective, transfers,
           training. A Sergeant or above reviews every application.</p>

    </div>

    <!-- APPLY -->
    <div class="card" id="applyCard">

        <h2><svg class="pIcon" width="19" height="19" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-add"></use></svg> New Application</h2>

        <div class="certForm">

            <label class="wizLabel">You are applying as</label>

            <div id="applyingAs" class="applyingAs">
                <div class="aaAvatar"><svg class="pIcon" width="20" height="20" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-officers"></use></svg></div>
                <div>
                    <div class="aaName">Detecting your account…</div>
                    <div class="aaMeta"></div>
                </div>
            </div>

            <label class="wizLabel">Application type</label>

            <div class="typeChips" id="apTypes"></div>

            <div id="apQuestions"></div>

            <button type="button" id="apAddQ" class="formAddQ">
                Add a question</button>

            <div id="apCertLink"></div>

            <label class="wizLabel">Motivation (short summary)</label>

            <textarea
                id="apMotivation"
                rows="3"
                style="background:#15283d;border:1px solid rgba(255,255,255,.08);border-radius:10px;color:white;padding:12px;outline:none;resize:vertical;font-family:inherit"></textarea>

            <button id="apSubmit" class="primaryBtn">Submit Application</button>

        </div>

    </div>

    <!-- REVIEW QUEUE (Sergeant I+ only) -->
    <div class="card hidden" id="reviewCard">

        <h2><svg class="pIcon" width="19" height="19" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-filter"></use></svg> Review Queue <span id="reviewCount" class="grantKind"></span></h2>

        <p class="muted" style="margin-top:-4px">Open an application to review
           its full details and decide.</p>

        <div id="reviewList"><p class="muted">Loading...</p></div>

    </div>

    <!-- MY APPLICATIONS -->
    <div class="card">

        <h2><svg class="pIcon" width="19" height="19" aria-hidden="true"><use href="assets/pims-sprite.svg#pims-history"></use></svg> My Applications</h2>

        <div id="appList"><p class="muted">Loading...</p></div>

    </div>

</div>

<div id="layoutFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="js/version.js"></script>

<script src="js/supabaseClient.js"></script>

<script src="js/core/idService.js"></script>
<script src="js/core/permissionService.js"></script>
<script src="js/core/auditService.js"></script>
<script src="js/core/timelineService.js"></script>
<script src="js/core/notificationService.js"></script>
<script src="js/core/certificateService.js"></script>
<script src="js/core/applicationService.js"></script>

<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/ui.js"></script>
<script src="js/layout.js"></script>
<script src="js/commandPalette.js"></script>
<script src="js/applications.js"></script>

<script>

if(localStorage.getItem("loggedIn")!="true"){

    window.location.href="index.html";

}

document.getElementById("layoutTop").innerHTML = AppLayout.createTopbar();
document.getElementById("layoutFooter").innerHTML = AppLayout.createFooter();

</script>

</body>

</html>
