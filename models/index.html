<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shiba 3D Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1418;
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }
  button { font-family: inherit; }

  /* --- Password gate --- */
  #gate { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
          background: radial-gradient(circle at 50% 30%, #14242b, #0b1418);
          transition: opacity 0.5s ease; }
  #gate.hide { opacity: 0; pointer-events: none; }
  #gate .card { width: min(90vw, 340px); padding: 28px 24px; border-radius: 18px;
                background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
                text-align: center; color: #eef4f3; }
  #gate h2 { font-size: 19px; font-weight: 650; }
  #gate .sub { font-size: 13px; opacity: 0.7; margin: 6px 0 18px; }
  #gate input { width: 100%; height: 46px; padding: 0 14px; border-radius: 12px;
                border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.25);
                color: #fff; font-size: 15px; outline: none; }
  #gate input:focus { border-color: #6fae6f; }
  #gate button { width: 100%; height: 46px; margin-top: 12px; border: 0; border-radius: 12px;
                 background: #6fae6f; color: #07130a; font-size: 15px; font-weight: 650; cursor: pointer; }
  #gate button:hover { background: #7dbd7d; }
  #gate .err { color: #ff8a8a; font-size: 13px; min-height: 18px; margin-top: 10px; }
  #gate .mstat { font-size: 12.5px; color: #cfe0dd; margin: 14px 0 2px; }
  #gate .mstat b { font-weight: 650; color: #eef4f3; }
  #gate .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11.5px;
                 font-weight: 650; vertical-align: middle; margin-left: 4px; }
  #gate .badge.checking { background: rgba(255,255,255,0.10); color: #cfe0dd; }
  #gate .badge.found    { background: rgba(111,174,111,0.18); color: #8fd98f; }
  #gate .badge.missing  { background: rgba(255,107,107,0.18); color: #ff9b9b; }
  .shake { animation: shake 0.35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)}
                     40%,80%{transform:translateX(7px)} }

  /* --- Toast notifications (pop-out) --- */
  #toasts { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 30;
            width: min(92vw, 420px); pointer-events: none; }
  .toast { pointer-events: auto; display: flex; gap: 11px; align-items: flex-start;
           padding: 12px 14px; border-radius: 14px; color: #eef4f3;
           background: rgba(16,28,33,0.92); backdrop-filter: blur(10px);
           -webkit-backdrop-filter: blur(10px);
           border: 1px solid rgba(255,255,255,0.10); border-left: 3px solid #6fae6f;
           box-shadow: 0 12px 34px rgba(0,0,0,0.40);
           transform: translateY(-16px) scale(0.96); opacity: 0;
           transition: transform 0.34s cubic-bezier(.2,.9,.3,1.25), opacity 0.34s ease; }
  .toast.show { transform: translateY(0) scale(1); opacity: 1; }
  .toast.error   { border-left-color: #ff6b6b; }
  .toast.success { border-left-color: #6fae6f; }
  .toast.info    { border-left-color: #5aa6d6; }
  .toast .ic { flex: 0 0 20px; width: 20px; height: 20px; margin-top: 1px; }
  .toast .ic svg { width: 100%; height: 100%; display: block; }
  .toast.error .ic   { color: #ff6b6b; }
  .toast.success .ic { color: #6fae6f; }
  .toast.info .ic    { color: #5aa6d6; }
  .toast .tx { flex: 1; font-size: 13px; line-height: 1.45; }
  .toast .tx b { display: block; font-weight: 650; font-size: 13.5px; margin-bottom: 1px; }
  .toast .tx span { opacity: 0.78; }
  .toast .x { flex: 0 0 auto; cursor: pointer; border: 0; background: transparent;
              color: #9fb6b2; font-size: 15px; line-height: 1; padding: 2px 4px; }
  .toast .x:hover { color: #fff; }

  /* --- Overlay info --- */
  #info { position: fixed; left: 16px; bottom: 16px; max-width: 70vw; padding: 12px 16px;
          border-radius: 14px; background: rgba(10,20,24,0.55); backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12);
          color: #eef4f3; pointer-events: none; line-height: 1.4; }
  #info h1 { font-size: clamp(15px,2.6vw,20px); font-weight: 650; }
  #info p  { font-size: clamp(11px,1.9vw,13px); opacity: 0.78; margin-top: 3px; }

  /* --- Viewer control buttons (top-right) --- */
  #vcontrols { position: fixed; top: 16px; right: 16px; z-index: 4;
               display: flex; flex-direction: column; gap: 8px; }
  #vcontrols button { width: 44px; height: 44px; display: grid; place-items: center;
                      border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);
                      background: rgba(10,20,24,0.55); backdrop-filter: blur(8px);
                      -webkit-backdrop-filter: blur(8px); color: #dfeae8; cursor: pointer;
                      transition: background 0.15s ease, color 0.15s ease; }
  #vcontrols button:hover { background: rgba(255,255,255,0.10); }
  #vcontrols button.active { background: #6fae6f; color: #07130a; }
  #vcontrols svg { width: 20px; height: 20px; }

  /* --- Transform toolbar (bottom) --- */
  #tools { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
           display: flex; gap: 8px; padding: 6px; border-radius: 999px;
           background: rgba(10,20,24,0.55); backdrop-filter: blur(8px);
           -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); z-index: 4; }
  #tools button { appearance: none; border: 0; cursor: pointer; min-height: 42px; padding: 0 16px;
                  border-radius: 999px; font-size: 13px; font-weight: 600; color: #dfeae8;
                  background: transparent; transition: background 0.15s ease, color 0.15s ease; }
  #tools button:hover { background: rgba(255,255,255,0.08); }
  #tools button.active { background: #6fae6f; color: #07130a; }

  @media (prefers-reduced-motion: reduce) {
    .toast { transition: opacity 0.2s ease; transform: none; }
    .shake { animation: none; }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="gate">
    <div class="card">
      <h2>Protected model</h2>
      <p class="sub">Enter the password to view</p>
      <p class="mstat">Model: <b id="mname">—</b> <span id="mbadge" class="badge checking">Checking…</span></p>
      <input id="pw" type="password" placeholder="Password" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="pwBtn">Unlock</button>
      <p id="pwErr" class="err"></p>
    </div>
  </div>

  <div id="toasts"></div>

  <div id="vcontrols">
    <button id="btnReset" title="Reset view" aria-label="Reset view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button id="btnWire" title="Wireframe" aria-label="Toggle wireframe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </button>
    <button id="btnFull" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M16 21h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
  </div>

  <div id="info"><h1 id="title">Model</h1><p id="dims"></p><p id="note">Fully interactive — move, rotate &amp; scale</p></div>
  <div id="tools">
    <button data-mode="translate" class="active">Move</button>
    <button data-mode="rotate">Rotate</button>
    <button data-mode="scale">Scale</button>
    <button data-mode="reset">Reset</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/[email protected]/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/[email protected]/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { TransformControls } from 'three/addons/controls/TransformControls.js';
  import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
  import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

  // ---------- TOAST SYSTEM ----------
  const ICONS = {
    error:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    info:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
  };
  function dismissToast(el) { el.classList.remove('show'); setTimeout(() => el.remove(), 340); }
  function toast(title, detail, type = 'info', sticky = false) {
    const wrap = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.innerHTML = `<span class="ic">${ICONS[type] || ICONS.info}</span><div class="tx"><b></b><span></span></div>`;
    el.querySelector('b').textContent = title;
    const sp = el.querySelector('span');
    if (detail) sp.textContent = detail; else sp.remove();
    if (sticky || type === 'error') {
      const x = document.createElement('button');
      x.className = 'x'; x.textContent = '\u2715'; x.setAttribute('aria-label', 'Dismiss');
      x.addEventListener('click', () => dismissToast(el));
      el.appendChild(x);
    }
    wrap.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    if (!sticky && type !== 'error') setTimeout(() => dismissToast(el), 3200);
    return el;
  }
  function setToastDetail(el, text) { const s = el && el.querySelector('.tx span'); if (s) s.textContent = text; }

  // ---------- PROJECT REGISTRY ----------
  const PROJECTS = {
    MainProject01: { title: "A-Frame Cabin", file: "MainProject01" }
  };
  function getProjectId() {
    const raw = location.search.replace(/^\?/, '');
    if (!raw) return 'MainProject01';
    if (raw.includes('=')) {
      const p = new URLSearchParams(location.search);
      return p.get('project') || p.get('model') || 'MainProject01';
    }
    return decodeURIComponent(raw);
  }

  // ---------- LOCK-SCREEN MODEL PREFLIGHT ----------
  // Checks whether the model file exists and shows it on the lock screen,
  // before the password is entered. The lock screen can only confirm the file
  // is FOUND on the server (not that it rendered), so it reads "Found".
  (function preflightModel() {
    const id = getProjectId();
    const cfg = PROJECTS[id] || PROJECTS.MainProject01;
    const base = cfg.file || id;
    const nameEl = document.getElementById('mname');
    const badge = document.getElementById('mbadge');
    if (nameEl) nameEl.textContent = '"' + id + '"';
    function set(state, text) { if (badge) { badge.className = 'badge ' + state; badge.textContent = text; } }
    fetch('./' + base + '.obj', { method: 'HEAD', cache: 'no-store' })
      .then((r) => set(r.ok ? 'found' : 'missing', r.ok ? 'Found' : 'Not found'))
      .catch(() => set('missing', 'Not found'));
  })();

  // ---------- PASSWORD GATE (soft client-side gate, not strong security) ----------
  // SHA-256 of your password. Current password: "zahradka1234".
  const PASSWORD_HASH = "daf74d0a31d0093afa4899b3f0764a4db9b45e4386c5c99bbc536987ccdc41ca";
  async function sha256Hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }
  const gate = document.getElementById('gate');
  const pwInput = document.getElementById('pw');
  const pwErr = document.getElementById('pwErr');
  let unlocked = false;
  async function tryUnlock() {
    if (unlocked) return;
    if (!pwInput.value) return;
    if (await sha256Hex(pwInput.value) === PASSWORD_HASH) {
      unlocked = true;
      gate.classList.add('hide');
      setTimeout(() => gate.remove(), 500);
      toast('Unlocked', 'Loading your model…', 'success');
      buildViewer();
    } else {
      pwErr.textContent = 'Incorrect password';
      const card = gate.querySelector('.card');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      pwInput.select();
      toast('Wrong password', 'Check it and try again.', 'error');
    }
  }
  document.getElementById('pwBtn').addEventListener('click', tryUnlock);
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  pwInput.focus();

  // ---------- VIEWER ----------
  function buildViewer() {
    const cfg = PROJECTS[getProjectId()] || PROJECTS.MainProject01;
    const base = cfg.file || getProjectId();
    const SKY = 0x9ec4dc;
    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SKY);
    scene.fog = new THREE.Fog(SKY, 60, 220);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 2000);
    camera.position.set(8, 6, 10);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.addEventListener('start', () => { controls.autoRotate = false; });

    scene.add(new THREE.HemisphereLight(0xbfe3ff, 0x3a5230, 0.9));
    const sun = new THREE.DirectionalLight(0xfff2dd, 2.0);
    sun.position.set(20, 30, 16); sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(400, 48),
      new THREE.MeshStandardMaterial({ color: 0x3f5a2e, roughness: 1 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
    scene.add(ground);

    const gizmo = new TransformControls(camera, renderer.domElement);
    gizmo.setSpace('world'); scene.add(gizmo);
    gizmo.addEventListener('dragging-changed', (e) => { controls.enabled = !e.value; });

    let model = null, home = null, camHome = null, wire = false;

    function setMode(mode) {
      controls.autoRotate = false;
      if (!model) return;
      if (mode === 'reset') {
        model.position.copy(home.pos); model.rotation.copy(home.rot); model.scale.copy(home.scl);
        return;
      }
      gizmo.setMode(mode);
      document.querySelectorAll('#tools button').forEach((b) =>
        b.classList.toggle('active', b.dataset.mode === mode));
    }
    document.querySelectorAll('#tools button').forEach((b) =>
      b.addEventListener('click', () => setMode(b.dataset.mode)));
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') setMode('translate');
      else if (k === 'e') setMode('rotate');
      else if (k === 'r') setMode('scale');
    });

    // Viewer controls
    document.getElementById('btnReset').addEventListener('click', () => {
      if (camHome) { camera.position.copy(camHome.pos); controls.target.copy(camHome.target); }
      if (model && home) { model.position.copy(home.pos); model.rotation.copy(home.rot); model.scale.copy(home.scl); }
      controls.autoRotate = false;
      toast('View reset', null, 'info');
    });
    document.getElementById('btnWire').addEventListener('click', (e) => {
      wire = !wire;
      if (model) model.traverse((c) => {
        if (c.isMesh) (Array.isArray(c.material) ? c.material : [c.material]).forEach((m) => { if (m) m.wireframe = wire; });
      });
      e.currentTarget.classList.toggle('active', wire);
    });
    document.getElementById('btnFull').addEventListener('click', (e) => {
      if (!document.fullscreenElement) { (document.documentElement.requestFullscreen || (() => {})).call(document.documentElement); }
      else { (document.exitFullscreen || (() => {})).call(document); }
    });
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('btnFull').classList.toggle('active', !!document.fullscreenElement);
    });

    const loadingToast = toast('Loading model', base + '.obj', 'info', true);

    function onModelLoaded(obj) {
      obj.traverse((c) => {
        if (c.isMesh) {
          c.castShadow = true; c.receiveShadow = true;
          (Array.isArray(c.material) ? c.material : [c.material]).forEach((m) => { if (m) m.side = THREE.DoubleSide; });
        }
      });
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      obj.position.x -= center.x; obj.position.z -= center.z; obj.position.y -= box.min.y;

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      controls.target.set(0, size.y * 0.45, 0);
      controls.minDistance = maxDim * 0.4; controls.maxDistance = maxDim * 12;
      camera.position.set(maxDim * 1.4, maxDim * 1.0, maxDim * 1.7);

      scene.add(obj);
      model = obj;
      home = { pos: obj.position.clone(), rot: obj.rotation.clone(), scl: obj.scale.clone() };
      camHome = { pos: camera.position.clone(), target: controls.target.clone() };
      gizmo.attach(obj);
      setMode('translate');

      document.getElementById('title').textContent = cfg.title;
      document.getElementById('dims').textContent =
        `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} (model units)`;
      dismissToast(loadingToast);
      toast('Model loaded', cfg.title, 'success');
    }

    function loadOBJ(materials) {
      const objLoader = new OBJLoader();
      if (materials) objLoader.setMaterials(materials);
      objLoader.setPath('./');
      objLoader.load(
        base + '.obj',
        onModelLoaded,
        (xhr) => { if (xhr.total) setToastDetail(loadingToast, base + '.obj — ' + Math.round(xhr.loaded / xhr.total * 100) + '%'); },
        () => { dismissToast(loadingToast);
                toast('Can\u2019t load ' + base + '.obj', 'Check the file is in this folder and the name matches exactly (case-sensitive).', 'error'); }
      );
    }

    const mtlLoader = new MTLLoader();
    mtlLoader.setPath('./'); mtlLoader.setResourcePath('./');
    mtlLoader.load(
      base + '.mtl',
      (materials) => { materials.preload(); loadOBJ(materials); },
      undefined,
      () => { toast('No materials file', 'Showing ' + base + '.obj without colours. Add ' + base + '.mtl to include them.', 'info'); loadOBJ(null); }
    );

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  }
  </script>
</body>
</html>
