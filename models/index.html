<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiba 3D Viewer</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/[email protected]/dist/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1418;
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

  model-viewer { position: fixed; inset: 0; width: 100%; height: 100%;
                 background: linear-gradient(#9ec4dc, #cfe3d2); }

  #gate { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
          background: radial-gradient(circle at 50% 30%, #14242b, #0b1418);
          transition: opacity 0.5s ease; }
  #gate.hide { opacity: 0; pointer-events: none; }
  #gate .card { width: min(90vw, 340px); padding: 28px 24px; border-radius: 18px;
                background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
                text-align: center; color: #eef4f3; }
  #gate h2 { font-size: 19px; font-weight: 650; }
  #gate .sub { font-size: 13px; opacity: 0.7; margin: 6px 0 14px; }
  #gate .mstat { font-size: 12.5px; color: #cfe0dd; margin-bottom: 14px; }
  #gate .mstat b { color: #eef4f3; }
  #gate .badge { display: inline-block; padding: 2px 9px; border-radius: 999px;
                 font-size: 11.5px; font-weight: 650; margin-left: 4px; }
  .badge.checking { background: rgba(255,255,255,0.10); color: #cfe0dd; }
  .badge.found    { background: rgba(111,174,111,0.18); color: #8fd98f; }
  .badge.missing  { background: rgba(255,107,107,0.18); color: #ff9b9b; }
  #gate input { width: 100%; height: 46px; padding: 0 14px; border-radius: 12px;
                border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.25);
                color: #fff; font-size: 15px; outline: none; }
  #gate input:focus { border-color: #6fae6f; }
  #gate button { width: 100%; height: 46px; margin-top: 12px; border: 0; border-radius: 12px;
                 background: #6fae6f; color: #07130a; font-size: 15px; font-weight: 650;
                 cursor: pointer; font-family: inherit; }
  #gate .err { color: #ff8a8a; font-size: 13px; min-height: 18px; margin-top: 10px; }
  .shake { animation: shake 0.35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)}
                     40%,80%{transform:translateX(7px)} }

  #banner { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 20;
            max-width: 92vw; padding: 10px 16px; border-radius: 12px; font-size: 13px;
            color: #eef4f3; background: rgba(16,28,33,0.92);
            border: 1px solid rgba(255,255,255,0.10); border-left: 3px solid #5aa6d6;
            display: none; }
  #banner.show { display: block; }
  #banner.error { border-left-color: #ff6b6b; }
  #banner.success { border-left-color: #6fae6f; }

  #info { position: fixed; left: 16px; bottom: 16px; padding: 12px 16px; border-radius: 14px;
          background: rgba(10,20,24,0.55); border: 1px solid rgba(255,255,255,0.12);
          color: #eef4f3; pointer-events: none; }
  #info h1 { font-size: 17px; font-weight: 650; }
  #info p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
</style>
</head>
<body>

  <model-viewer id="mv"
    src=""
    camera-controls
    auto-rotate
    auto-rotate-delay="1500"
    shadow-intensity="1"
    exposure="1.05"
    interaction-prompt="auto"
    touch-action="none">
  </model-viewer>

  <div id="banner"></div>

  <div id="info">
    <h1>A-Frame Cabin</h1>
    <p>Drag to rotate · pinch or scroll to zoom · two fingers to move</p>
  </div>

  <div id="gate">
    <div class="card">
      <h2>Protected model</h2>
      <p class="sub">Enter the password to view</p>
      <p class="mstat">Model: <b id="mname">—</b><span id="mbadge" class="badge checking">Checking…</span></p>
      <input id="pw" type="password" placeholder="Password" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="pwBtn">Unlock</button>
      <p id="pwErr" class="err"></p>
    </div>
  </div>

<script>
  var PASSWORD = "zahradka1234";

  // Which model to load: ?MainProject01 -> MainProject01.glb
  function getProjectId() {
    var raw = location.search.replace(/^\?/, '');
    if (!raw) return 'MainProject01';
    if (raw.indexOf('=') !== -1) {
      var p = new URLSearchParams(location.search);
      return p.get('project') || p.get('model') || 'MainProject01';
    }
    return decodeURIComponent(raw);
  }
  var PROJECT = getProjectId();
  var FILE = PROJECT + '.glb';

  function banner(msg, type) {
    var b = document.getElementById('banner');
    b.textContent = msg;
    b.className = 'show' + (type ? ' ' + type : '');
    if (type !== 'error') setTimeout(function () { b.className = ''; }, 3500);
  }

  // Lock-screen check: does the .glb exist on the server?
  document.getElementById('mname').textContent = '"' + PROJECT + '"';
  fetch('./' + FILE, { method: 'HEAD', cache: 'no-store' })
    .then(function (r) {
      var badge = document.getElementById('mbadge');
      badge.className = 'badge ' + (r.ok ? 'found' : 'missing');
      badge.textContent = r.ok ? 'Found' : 'Not found';
    })
    .catch(function () {
      var badge = document.getElementById('mbadge');
      badge.className = 'badge missing';
      badge.textContent = 'Not found';
    });

  // Simple password gate
  (function () {
    var gate = document.getElementById('gate');
    var pwInput = document.getElementById('pw');
    var pwErr = document.getElementById('pwErr');
    var mv = document.getElementById('mv');
    var unlocked = false;

    mv.addEventListener('load', function () { banner('Model loaded', 'success'); });
    mv.addEventListener('error', function () {
      banner('Could not load ' + FILE + ' — check the file is in the models folder with exactly that name.', 'error');
    });

    function tryUnlock() {
      if (unlocked) return;
      if (pwInput.value.trim() === PASSWORD) {
        unlocked = true;
        gate.classList.add('hide');
        setTimeout(function () { gate.remove(); }, 500);
        banner('Loading ' + FILE + ' …');
        mv.src = './' + FILE;   // model starts loading only after unlock
      } else {
        pwErr.textContent = 'Incorrect password';
        var card = gate.querySelector('.card');
        card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
        pwInput.select();
      }
    }
    document.getElementById('pwBtn').addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryUnlock(); });
    pwInput.focus();
  })();
</script>
</body>
</html>
