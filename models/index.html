<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shiba 3D Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1418;
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* --- Password gate --- */
  #gate { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
          background: radial-gradient(circle at 50% 30%, #14242b, #0b1418);
          transition: opacity 0.5s ease; }
  #gate.hide { opacity: 0; pointer-events: none; }
  #gate .card { width: min(90vw, 340px); padding: 28px 24px; border-radius: 18px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.12);
                text-align: center; color: #eef4f3; }
  #gate h2 { font-size: 19px; font-weight: 650; }
  #gate .sub { font-size: 13px; opacity: 0.7; margin: 6px 0 18px; }
  #gate input { width: 100%; height: 46px; padding: 0 14px; border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.18); background: rgba(0, 0, 0, 0.25);
                color: #fff; font-size: 15px; outline: none; }
  #gate input:focus { border-color: #6fae6f; }
  #gate button { width: 100%; height: 46px; margin-top: 12px; border: 0; border-radius: 12px;
                 background: #6fae6f; color: #07130a; font-size: 15px; font-weight: 650;
                 cursor: pointer; }
  #gate button:hover { background: #7dbd7d; }
  #gate .err { color: #ff8a8a; font-size: 13px; min-height: 18px; margin-top: 10px; }
  .shake { animation: shake 0.35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)}
                     40%,80%{transform:translateX(7px)} }

  /* --- Overlay UI --- */
  #info {
    position: fixed; left: 16px; bottom: 16px; max-width: 70vw;
    padding: 12px 16px; border-radius: 14px;
    background: rgba(10, 20, 24, 0.55); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #eef4f3; pointer-events: none; line-height: 1.4;
  }
  #info h1 { font-size: clamp(15px, 2.6vw, 20px); font-weight: 650; letter-spacing: 0.2px; }
  #info p  { font-size: clamp(11px, 1.9vw, 13px); opacity: 0.78; margin-top: 3px; }

  #hint {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    padding: 8px 14px; border-radius: 999px;
    background: rgba(10, 20, 24, 0.5); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #dfeae8; font-size: 12px; pointer-events: none;
    transition: opacity 0.8s ease; opacity: 1;
  }
  #hint.hide { opacity: 0; }

  /* --- Interactive toolbar --- */
  #tools {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    display: flex; gap: 8px; padding: 6px;
    border-radius: 999px; background: rgba(10, 20, 24, 0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.12); z-index: 4;
  }
  #tools button {
    appearance: none; border: 0; cursor: pointer;
    min-height: 42px; padding: 0 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600; color: #dfeae8;
    background: transparent; transition: background 0.15s ease, color 0.15s ease;
  }
  #tools button:hover { background: rgba(255, 255, 255, 0.08); }
  #tools button.active { background: #6fae6f; color: #07130a; }
</style>
</head>
<body>
  <div id="app"></div>

  <!-- Password gate -->
  <div id="gate">
    <div class="card">
      <h2>Protected model</h2>
      <p class="sub">Enter the password to view</p>
      <input id="pw" type="password" placeholder="Password" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="pwBtn">Unlock</button>
      <p id="pwErr" class="err"></p>
    </div>
  </div>

  <div id="hint">Drag to orbit &nbsp;·&nbsp; use the buttons to move, rotate &amp; scale</div>
  <div id="info"><h1 id="title">A-Frame Cabin</h1><p id="dims"></p><p id="note">Fully interactive — move, rotate &amp; scale</p></div>
  <div id="tools">
    <button data-mode="translate" class="active">Move</button>
    <button data-mode="rotate">Rotate</button>
    <button data-mode="scale">Scale</button>
    <button data-mode="reset">Reset</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/[email protected]/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/[email protected]/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { TransformControls } from 'three/addons/controls/TransformControls.js';

  // ======================================================================
  // PASSWORD GATE  (soft client-side gate — see notes; NOT strong security)
  // ----------------------------------------------------------------------
  // PASSWORD_HASH is the SHA-256 of your password. Current password: "zahradka1234".
  // To set your own: open any browser console and run:
  //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOURPASSWORD'))
  //     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  // then paste the printed hex string below.
  // ======================================================================
  const PASSWORD_HASH = "daf74d0a31d0093afa4899b3f0764a4db9b45e4386c5c99bbc536987ccdc41ca";

  async function sha256Hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  const gate = document.getElementById('gate');
  const pwInput = document.getElementById('pw');
  const pwBtn = document.getElementById('pwBtn');
  const pwErr = document.getElementById('pwErr');
  let unlocked = false;

  async function tryUnlock() {
    if (unlocked) return;
    const val = pwInput.value;
    if (!val) return;
    const h = await sha256Hex(val);
    if (h === PASSWORD_HASH) {
      unlocked = true;
      gate.classList.add('hide');
      setTimeout(() => gate.remove(), 500);
      buildViewer();            // the 3D scene is only built after unlocking
    } else {
      pwErr.textContent = 'Incorrect password';
      const card = gate.querySelector('.card');
      card.classList.remove('shake');
      void card.offsetWidth;    // restart the shake animation
      card.classList.add('shake');
      pwInput.select();
    }
  }
  pwBtn.addEventListener('click', tryUnlock);
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  pwInput.focus();

  // ======================================================================
  // PROJECT REGISTRY  (URL ?MainProject01 picks which entry to show)
  // ======================================================================
  const PROJECTS = {
    MainProject01: {
      title: "A-Frame Cabin — Main Project 01",
      WIDTH: 4.1, LENGTH: 8.9, RIDGE_HEIGHT: 5.0,
      FLOOR_THICKNESS: 0.20, ADD_LOFT: true, LOFT_HEIGHT: 2.4, LOFT_COVERAGE: 0.40,
      ADD_DECK: true, DECK_DEPTH: 2.0, ADD_PIERS: true, PIER_HEIGHT: 0.6, PIER_SIZE: 0.20
    }
  };
  function getProjectId() {
    const raw = location.search.replace(/^\?/, '');
    if (!raw) return 'MainProject01';
    if (raw.includes('=')) {
      const p = new URLSearchParams(location.search);
      return p.get('project') || p.get('model') || 'MainProject01';
    }
    return decodeURIComponent(raw);
  }

  // ======================================================================
  // VIEWER  (built only after a correct password)
  // ======================================================================
  function buildViewer() {
    const cfg = PROJECTS[getProjectId()] || PROJECTS.MainProject01;
    const SKY = 0x9ec4dc;
    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SKY);
    scene.fog = new THREE.Fog(SKY, 35, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(cfg.WIDTH * 2.4, cfg.RIDGE_HEIGHT * 1.15, cfg.LENGTH * 1.25);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, cfg.RIDGE_HEIGHT * 0.4, 0);
    controls.minDistance = cfg.WIDTH * 1.2;
    controls.maxDistance = 70;
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.addEventListener('start', () => { controls.autoRotate = false; hideHint(); });

    scene.add(new THREE.HemisphereLight(0xbfe3ff, 0x3a5230, 0.85));
    const sun = new THREE.DirectionalLight(0xfff2dd, 2.0);
    sun.position.set(14, 22, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    const sb = 22;
    sun.shadow.camera.left = -sb; sun.shadow.camera.right = sb;
    sun.shadow.camera.top = sb; sun.shadow.camera.bottom = -sb;
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 80;
    sun.shadow.bias = -0.0004;
    scene.add(sun);

    // --- geometry helpers ---
    function quadMesh(p1, p2, p3, p4, material) {
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(
        new Float32Array([...p1, ...p2, ...p3, ...p1, ...p3, ...p4]), 3));
      g.computeVertexNormals();
      const m = new THREE.Mesh(g, material);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    function triMesh(p1, p2, p3, material) {
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([...p1, ...p2, ...p3]), 3));
      g.computeVertexNormals();
      const m = new THREE.Mesh(g, material);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    function box(w, h, d, x, y, z, material) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      m.position.set(x, y, z);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }

    // --- build the cabin (X = width, Y = up, Z = length) ---
    const matRoof  = new THREE.MeshStandardMaterial({ color: 0x4d3526, roughness: 0.85, side: THREE.DoubleSide });
    const matGable = new THREE.MeshStandardMaterial({ color: 0x9a7350, roughness: 0.8,  side: THREE.DoubleSide });
    const matWood  = new THREE.MeshStandardMaterial({ color: 0x73512f, roughness: 0.85 });
    const matPier  = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.9 });

    const cabin = new THREE.Group();
    const hw = cfg.WIDTH / 2, hl = cfg.LENGTH / 2, H = cfg.RIDGE_HEIGHT;
    const ft = cfg.FLOOR_THICKNESS;

    cabin.add(box(cfg.WIDTH, ft, cfg.LENGTH, 0, -ft / 2, 0, matWood));
    cabin.add(quadMesh([-hw, 0, -hl], [-hw, 0, hl], [0, H, hl], [0, H, -hl], matRoof));
    cabin.add(quadMesh([hw, 0, -hl], [0, H, -hl], [0, H, hl], [hw, 0, hl], matRoof));
    cabin.add(triMesh([-hw, 0, -hl], [hw, 0, -hl], [0, H, -hl], matGable));
    cabin.add(triMesh([-hw, 0, hl], [hw, 0, hl], [0, H, hl], matGable));

    if (cfg.ADD_LOFT && cfg.LOFT_HEIGHT < H) {
      const loftHW = hw * (1 - cfg.LOFT_HEIGHT / H);
      const cov = cfg.LOFT_COVERAGE * cfg.LENGTH;
      cabin.add(box(2 * loftHW, 0.12, cov, 0, cfg.LOFT_HEIGHT, hl - cov / 2, matWood));
    }
    if (cfg.ADD_DECK) {
      cabin.add(box(cfg.WIDTH, 0.12, cfg.DECK_DEPTH, 0, -0.06, -hl - cfg.DECK_DEPTH / 2, matWood));
    }
    let groundY = -ft;
    if (cfg.ADD_PIERS) {
      const ph = cfg.PIER_HEIGHT, ps = cfg.PIER_SIZE, inset = ps;
      groundY = -ft - ph;
      const xs = [-hw + inset, hw - inset];
      const zs = [-hl + inset, 0, hl - inset];
      for (const x of xs) for (const z of zs)
        cabin.add(box(ps, ph, ps, x, -ft - ph / 2, z, matPier));
    }
    scene.add(cabin);

    // --- interactivity: move / rotate / scale ---
    const gizmo = new TransformControls(camera, renderer.domElement);
    gizmo.attach(cabin);
    gizmo.setSpace('world');
    scene.add(gizmo);
    gizmo.addEventListener('dragging-changed', (e) => { controls.enabled = !e.value; });

    const home = { pos: cabin.position.clone(), rot: cabin.rotation.clone(), scl: cabin.scale.clone() };
    function setMode(mode) {
      controls.autoRotate = false;
      hideHint();
      if (mode === 'reset') {
        cabin.position.copy(home.pos); cabin.rotation.copy(home.rot); cabin.scale.copy(home.scl);
        return;
      }
      gizmo.setMode(mode);
      document.querySelectorAll('#tools button').forEach((b) =>
        b.classList.toggle('active', b.dataset.mode === mode));
    }
    document.querySelectorAll('#tools button').forEach((b) =>
      b.addEventListener('click', () => setMode(b.dataset.mode)));
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'w') setMode('translate');
      else if (k === 'e') setMode('rotate');
      else if (k === 'r') setMode('scale');
    });

    // --- environment ---
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(120, 48),
      new THREE.MeshStandardMaterial({ color: 0x3f5a2e, roughness: 1 }));
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = groundY;
    ground.receiveShadow = true;
    scene.add(ground);

    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5b4326, roughness: 1 });
    const leafMat  = new THREE.MeshStandardMaterial({ color: 0x2f5d33, roughness: 1 });
    function tree(x, z, scale) {
      const t = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 1.4, 6), trunkMat);
      trunk.position.y = 0.7; trunk.castShadow = true; t.add(trunk);
      for (let i = 0; i < 3; i++) {
        const c = new THREE.Mesh(new THREE.ConeGeometry(1.3 - i * 0.32, 1.5, 8), leafMat);
        c.position.y = 1.6 + i * 1.0; c.castShadow = true; t.add(c);
      }
      t.position.set(x, groundY, z);
      t.scale.setScalar(scale);
      scene.add(t);
    }
    let seed = 1337;
    const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
    for (let i = 0; i < 16; i++) {
      const ang = rnd() * Math.PI * 2;
      const dist = 9 + rnd() * 14;
      tree(Math.cos(ang) * dist, Math.sin(ang) * dist, 0.8 + rnd() * 0.9);
    }

    // --- UI + render loop ---
    document.getElementById('title').textContent = cfg.title;
    document.getElementById('dims').textContent =
      `${cfg.WIDTH} m wide · ${cfg.LENGTH} m long · ${cfg.RIDGE_HEIGHT} m ridge`;

    setMode('translate');

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  }

  // shared helper used by both the gate and the viewer
  let hintTimer = setTimeout(hideHint, 6000);
  function hideHint() {
    const hint = document.getElementById('hint');
    if (hint) hint.classList.add('hide');
    clearTimeout(hintTimer);
  }
  </script>
</body>
</html>
