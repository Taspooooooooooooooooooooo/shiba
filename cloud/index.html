<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SHIBA CLOUD | File Sharing</title>

    <meta name="description" content="SHIBA CLOUD - upload files and share them with a link">
    <meta name="theme-color" content="#0b1623">

    <link rel="stylesheet" href="../lapd/css/style.css">

    <style>

        body{

            min-height:100vh;

            display:flex;

            flex-direction:column;

            align-items:center;

            padding:40px 20px;

            gap:25px;

        }

        .cloud-header{

            text-align:center;

        }

        .cloud-header h1{

            font-size:34px;

            color:var(--primary);

        }

        .cloud-header span{

            color:var(--text2);

        }

        .cloud-card{

            background:var(--card);

            border:1px solid var(--border);

            border-radius:var(--radius);

            box-shadow:var(--shadow);

            padding:25px;

            width:640px;

            max-width:95vw;

        }

        #dropZone{

            border:2px dashed var(--border);

            border-radius:14px;

            padding:45px 20px;

            text-align:center;

            color:var(--text2);

            cursor:pointer;

            transition:0.2s;

        }

        #dropZone.dragover,
        #dropZone:hover{

            border-color:var(--primary);

            color:var(--text);

            background:#2e8bff14;

        }

        #fileInput{

            display:none;

        }

        .file-row{

            display:flex;

            align-items:center;

            justify-content:space-between;

            gap:10px;

            padding:12px;

            border-radius:10px;

            background:#15283d;

            margin-top:10px;

            flex-wrap:wrap;

        }

        .file-row .meta{

            flex:1;

            min-width:180px;

            overflow:hidden;

        }

        .file-row .meta strong{

            display:block;

            white-space:nowrap;

            overflow:hidden;

            text-overflow:ellipsis;

        }

        .file-row .meta small{

            color:var(--text2);

        }

        .btn,
        .file-row button,
        .viewer-actions a,
        .viewer-actions button{

            padding:8px 14px;

            border:none;

            border-radius:8px;

            background:var(--primary);

            color:white;

            cursor:pointer;

            font-size:13px;

            text-decoration:none;

            transition:0.2s;

        }

        .btn:hover,
        .file-row button:hover,
        .viewer-actions a:hover,
        .viewer-actions button:hover{

            background:var(--primaryHover);

        }

        .file-row button.danger{

            background:#3d1520;

        }

        .file-row button.danger:hover{

            background:var(--danger);

        }

        .banner{

            padding:14px;

            border-radius:10px;

            margin-bottom:15px;

            display:none;

        }

        .banner.error{

            display:block;

            background:#3d152033;

            border:1px solid var(--danger);

            color:var(--text);

        }

        .banner.info{

            display:block;

            background:#2e8bff14;

            border:1px solid var(--primary);

            color:var(--text);

        }

        #viewerPreview{

            margin-top:15px;

            text-align:center;

        }

        #viewerPreview img,
        #viewerPreview video{

            max-width:100%;

            max-height:70vh;

            width:auto;

            border-radius:12px;

            border:1px solid var(--border);

        }

        /* the viewer card gets wider so previews have room */

        #viewerCard{

            width:900px;

            max-width:95vw;

        }

        .viewer-actions{

            display:flex;

            gap:10px;

            justify-content:center;

            margin-top:15px;

            flex-wrap:wrap;

        }

        footer{

            margin-top:auto;

            color:var(--text2);

        }

        .backlink{

            color:var(--primary);

            text-decoration:none;

        }

        /* ---- ad zone + gate ---- */

        .adBannerCard{ width:760px; max-width:95vw; padding:0; overflow:hidden; }

        #adBanner{ min-height:90px; display:flex; align-items:center;
                   justify-content:center; }

        /* side ad rails — multiple banners in the empty margins.
           Only shown on wide screens; cloud pages only. */

        .adRail{

            position:fixed;

            top:90px;

            bottom:20px;

            width:210px;

            display:none;

            flex-direction:column;

            gap:16px;

            overflow:auto;

            z-index:5;

        }

        .adRailLeft{ left:16px; }

        .adRailRight{ right:16px; }

        .adSlot{

            min-height:250px;

            border-radius:14px;

            overflow:hidden;

            flex-shrink:0;

            display:flex;

            align-items:flex-start;

            justify-content:center;

        }

        @media(min-width:1280px){

            .adRail{ display:flex; }

        }

        .adPlaceholder{

            padding:22px;

            text-align:center;

            color:#8fa6c4;

            background:repeating-linear-gradient(45deg,#0e1c2e,#0e1c2e 12px,#101f33 12px,#101f33 24px);

        }

        .adReal{

            padding:22px;

            text-align:center;

            color:#5a6b80;

            font-size:11px;

            letter-spacing:2px;

            text-transform:uppercase;

        }

        .adGate{

            position:fixed;

            inset:0;

            z-index:100000;

            background:rgba(3,10,20,.88);

            backdrop-filter:blur(8px);

            display:flex;

            align-items:center;

            justify-content:center;

            padding:20px;

        }

        .adGateBox{

            background:#0f1c2b;

            border:1px solid rgba(255,255,255,.1);

            border-radius:18px;

            padding:26px;

            width:420px;

            max-width:94vw;

            text-align:center;

        }

        .adGateSub{ color:#8fa6c4; font-size:13px; margin:6px 0 14px; }

        .adGateAd{

            min-height:180px;

            border-radius:12px;

            overflow:hidden;

            margin-bottom:14px;

        }

        .adGateTimer{

            font-size:26px;

            font-weight:700;

            color:#58a5ff;

            margin-bottom:12px;

        }

        .adGateGo{

            width:100%;

            padding:13px;

            border:none;

            border-radius:12px;

            background:var(--primary);

            color:white;

            font-size:15px;

            cursor:pointer;

        }

        .adGateGo:disabled{

            background:#15283d;

            color:#5a6b80;

            cursor:not-allowed;

        }

    </style>

</head>

<body>

    <!-- ===================================================== -->
    <!-- Header                                                 -->
    <!-- ===================================================== -->

    <!-- side ad rails (wide screens; cloud only)
         left = 160x600 skyscraper · right = native banner -->
    <div class="adRail adRailLeft">
        <div class="adSlot" id="adLeft"></div>
    </div>

    <div class="adRail adRailRight">
        <div class="adSlot" id="adRight"></div>
    </div>

    <div class="cloud-header">

        <h1><img src="../lapd/assets/pims-badge.svg" alt="badge" style="width:40px;height:auto;vertical-align:-10px;margin-right:8px">SHIBA CLOUD</h1>

        <span>Upload a file, get a link, share it anywhere.</span>

    </div>

    <!-- ad banner (cloud only; never in the main PIMS system) -->
    <div class="cloud-card adBannerCard">

        <div id="adBanner"></div>

    </div>

    <!-- ===================================================== -->
    <!-- Shared-file viewer (?f=ID)                             -->
    <!-- ===================================================== -->

    <div class="cloud-card hidden" id="viewerCard">

        <div id="viewerBanner" class="banner"></div>

        <h2 id="viewerName">Loading...</h2>

        <small id="viewerInfo" style="color:var(--text2)"></small>

        <div id="viewerPreview"></div>

        <div class="viewer-actions" id="viewerActions"></div>

    </div>

    <!-- ===================================================== -->
    <!-- Upload area                                            -->
    <!-- ===================================================== -->

    <div class="cloud-card" id="uploadCard">

        <div id="uploadBanner" class="banner"></div>

        <div id="dropZone">

            <h2>Drop files here</h2>

            <p>or click to choose</p>

        </div>

        <input type="file" id="fileInput" multiple>

        <div id="uploadResults"></div>

    </div>

    <!-- ===================================================== -->
    <!-- Recent uploads                                         -->
    <!-- ===================================================== -->

    <div class="cloud-card" id="recentCard">

        <h2>Recent uploads</h2>

        <div id="recentList"><p style="color:var(--text2)">Loading...</p></div>

    </div>

    <footer>

        SHIBA CLOUD © 2026 · <a class="backlink" href="../lapd/dashboard.html">Back to SHIBA PIMS</a>

    </footer>

    <!-- ===================================================== -->
    <!-- JavaScript                                             -->
    <!-- ===================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="../lapd/js/supabaseClient.js"></script>

    <script src="adzone.js"></script>

    <script>

    /* ======================================================
       SHIBA CLOUD
       Uploads go to the Supabase storage bucket "cloud",
       metadata to the cloud_files table.
       Share link:  /cloud/?f=<ID>
    ====================================================== */

    const BUCKET = "cloud";

    /* Our client-side sanity cap. The REAL ceiling is Supabase's
       (the bucket's file_size_limit + the project's global upload
       limit + your plan). If Supabase rejects a big file we detect
       it below and say exactly why. Raise this if you raise the
       Supabase limit. */

    const MAX_UPLOAD_MB = 200;

    const SETUP_HINT =
        "Storage is not set up yet — run cloud/SETUP.sql in the Supabase SQL Editor once.";

    /* who's using the cloud + whether they manage everything.
       Managers (admins / chiefs) see every file; everyone else
       sees only their own uploads. */

    const ME = {
        username: localStorage.getItem("username") || null,
        role: localStorage.getItem("role") || null,
        authId: null
    };

    const IS_MANAGER = ["Super Administrator", "Chief", "Commander"]
        .includes(ME.role);

    /* deterrent (NOT real protection): discourage casual
       right-click "Save as" / drag-out to bypass the ad gate.
       A determined user can still reach public URLs. */

    document.addEventListener("contextmenu", (e) => {

        if (e.target.closest("#viewerPreview, .file-row, #recentList")) {

            e.preventDefault();

        }

    });

    document.addEventListener("dragstart", (e) => {

        if (e.target.closest("#viewerPreview")) e.preventDefault();

    });

    /* Storage operations use an ANON client (no auth session).
       The cloud bucket's storage policies allow the anon role;
       the shared window.db carries the logged-in Supabase Auth
       token, which the current policies do NOT permit for
       upload/delete. Routing storage through this keeps uploads
       working for logged-in officers. (Phase 3 RLS hardening
       will switch these to proper authenticated policies.) */

    const dbStorage = window.supabase.createClient(
        "https://vtqyqzuhifzqzqszhtwq.supabase.co",
        "sb_publishable_NunfAEMxNJA39nzFxtn42g_hsmzxcv8",
        { auth: { persistSession: false, autoRefreshToken: false } }
    ).storage;

    function generateFileId() {

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

        const bytes = new Uint8Array(11);

        crypto.getRandomValues(bytes);

        return [...bytes].map(b => chars[b % chars.length]).join("");

    }

    function formatSize(bytes) {

        if (bytes == null) return "";

        if (bytes < 1024) return bytes + " B";

        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";

        return (bytes / 1024 / 1024).toFixed(1) + " MB";

    }

    function shareLink(id) {

        return location.origin + location.pathname + "?=" + id;

    }

    /* ad-gated download link (people who open this must watch
       the ad before the file is handed over) */

    function downloadLink(id) {

        return location.origin + "/cloud/downloads/?=" + id;

    }

    /* force a REAL download (Save file), not open-in-tab.
       Cross-origin URLs ignore the <a download> attribute, so
       we fetch the bytes and hand over a same-origin blob. */

    async function forceDownload(url, filename, btn) {

        const original = btn ? btn.textContent : null;

        if (btn) { btn.disabled = true; btn.textContent = "Downloading…"; }

        try {

            const res = await fetch(url);

            const blob = await res.blob();

            const objUrl = URL.createObjectURL(blob);

            const a = document.createElement("a");

            a.href = objUrl;

            a.download = filename || "download";

            document.body.appendChild(a);

            a.click();

            a.remove();

            setTimeout(() => URL.revokeObjectURL(objUrl), 5000);

        } catch (e) {

            /* fallback if the fetch is blocked */

            window.open(url, "_blank", "noopener");

        }

        if (btn) { btn.disabled = false; btn.textContent = original; }

    }

    /* ======================================================
       MEDIA TYPES
       Browsers leave file.type empty for lots of formats
       (.mov, .mkv, .flac, ...) so we also map by extension.
    ====================================================== */

    const EXT_KIND = {

        /* images */
        png: "image", jpg: "image", jpeg: "image", jfif: "image",
        webp: "image", gif: "image", svg: "image", avif: "image",
        bmp: "image", ico: "image", tif: "image", tiff: "image",
        heic: "image", heif: "image",

        /* video */
        mp4: "video", mov: "video", m4v: "video", webm: "video",
        mkv: "video", avi: "video", ogv: "video", wmv: "video",
        mpg: "video", mpeg: "video", "3gp": "video",

        /* audio */
        mp3: "audio", wav: "audio", ogg: "audio", oga: "audio",
        m4a: "audio", aac: "audio", flac: "audio", opus: "audio",
        weba: "audio", wma: "audio", aiff: "audio", mid: "audio"

    };

    function extension(name) {

        const dot = name.lastIndexOf(".");

        return dot === -1 ? "" : name.slice(dot + 1).toLowerCase();

    }

    function mediaKind(name, mime) {

        if (mime) {

            if (mime.startsWith("image/")) return "image";
            if (mime.startsWith("video/")) return "video";
            if (mime.startsWith("audio/")) return "audio";

        }

        return EXT_KIND[extension(name)] || "file";

    }

    function guessMime(file) {

        if (file.type) return file.type;

        const kind = mediaKind(file.name, "");

        if (kind === "file") return null;

        return kind + "/" + extension(file.name);

    }

    function directLink(path) {

        return dbStorage.from(BUCKET).getPublicUrl(path).data.publicUrl;

    }

    function copyText(text, button) {

        navigator.clipboard.writeText(text).then(() => {

            const old = button.innerText;

            button.innerText = "Copied!";

            setTimeout(() => button.innerText = old, 1500);

        });

    }

    function showBanner(el, type, text) {

        el.className = "banner " + type;

        el.innerText = text;

    }

    /* ======================================================
       PICK MODE (?=from<sessionId>)
       SHIBA PIMS opened this page as a picker popup —
       chosen file is sent back to the opener tab.
    ====================================================== */

    let PICK_SID = null;

    function sendPick(id, name, path) {

        if (window.opener) {

            window.opener.postMessage({

                type: "shiba-pick",

                sid: PICK_SID,

                id: id,

                name: name,

                share: shareLink(id),

                direct: directLink(path)

            }, location.origin);

        }

        window.close();

    }

    function makeUseButton(id, name, path) {

        const use = document.createElement("button");

        use.innerText = "Use";

        use.onclick = () => sendPick(id, name, path);

        return use;

    }

    /* ======================================================
       VIEWER MODE (?f=ID)
    ====================================================== */

    async function openViewer(id) {

        const card = document.getElementById("viewerCard");

        card.classList.remove("hidden");

        const banner = document.getElementById("viewerBanner");

        const { data, error } = await db
            .from("cloud_files")
            .select("*")
            .eq("id", id)
            .maybeSingle();

        if (error || !data) {

            document.getElementById("viewerName").innerText = "File not found";

            showBanner(banner, "error",
                "No file exists for this link. It may have been deleted.");

            return;

        }

        document.getElementById("viewerName").innerText = data.name;

        document.getElementById("viewerInfo").innerText =
            formatSize(data.size) + " · uploaded " +
            new Date(data.created_at).toLocaleString();

        const url = directLink(data.path);

        const preview = document.getElementById("viewerPreview");

        const kind = mediaKind(data.name, data.mime || "");

        if (kind === "image") {

            preview.innerHTML = `<img src="${url}" alt="${data.name}">`;

        } else if (kind === "video") {

            preview.innerHTML = `<video src="${url}" controls></video>`;

        } else if (kind === "audio") {

            preview.innerHTML = `<audio src="${url}" controls></audio>`;

        } else {

            preview.innerHTML =
                `<p style="font-size:34px;margin:26px 0;color:#8fa6c4;letter-spacing:2px">FILE</p>`;

        }

        const actions = document.getElementById("viewerActions");

        actions.innerHTML = `
            <button id="doDownload">Watch ad &amp; download</button>
            <button id="copyShare">Copy share link</button>
        `;

        document.getElementById("doDownload").onclick = async (e) => {

            await AdZone.gate({
                title: "Preparing your download",
                seconds: AdZone.watchSeconds(data.size)
            });

            await forceDownload(url, data.name, e.target);

        };

        document.getElementById("copyShare").onclick =
            (e) => copyText(shareLink(id), e.target);

    }

    /* ======================================================
       UPLOAD
    ====================================================== */

    async function uploadFile(file) {

        const results = document.getElementById("uploadResults");

        const row = document.createElement("div");

        row.className = "file-row";

        row.innerHTML = `
            <div class="meta">
                <strong>${file.name}</strong>
                <small>${formatSize(file.size)} · uploading...</small>
            </div>
        `;

        results.prepend(row);

        if (file.size > MAX_UPLOAD_MB * 1024 * 1024) {

            row.querySelector("small").innerText =
                "Too big — " + MAX_UPLOAD_MB + " MB limit";

            return;

        }

        /* ad-watch gate — support SHIBA Cloud before the upload */

        row.querySelector("small").innerText = "watch a short ad to upload…";

        await AdZone.gate({
            title: "Preparing your upload",
            seconds: AdZone.watchSeconds(file.size)
        });

        row.querySelector("small").innerText = "uploading...";

        const id = generateFileId();

        const path = id + "/" + file.name;

        const { error } = await dbStorage
            .from(BUCKET)
            .upload(path, file);

        if (error) {

            console.error("UPLOAD ERROR:", error);

            const msg = error.message || "";

            const status = error.statusCode || error.status;

            /* Supabase rejected the file for its own size limit */

            const tooBig = status == 413 ||
                /maximum allowed size|payload too large|entity too large|exceeded/i
                    .test(msg);

            row.querySelector("small").innerText =
                tooBig ? "Server limit — file too large" : "Upload failed";

            showBanner(document.getElementById("uploadBanner"), "error",
                tooBig
                    ? "Supabase rejected this file — it's over your project's " +
                      "upload limit. Raise it in Supabase → Storage → Settings " +
                      "(Free plan caps at ~50 MB / 1 GB total; bigger needs Pro)."
                    : /bucket|policy|security|not.*found/i.test(msg)
                        ? SETUP_HINT
                        : "Upload failed: " + msg);

            return;

        }

        const { error: dbError } = await db
            .from("cloud_files")
            .insert([{
                id: id,
                name: file.name,
                path: path,
                size: file.size,
                mime: guessMime(file),
                owner_username: ME.username,
                owner_id: ME.authId
            }]);

        if (dbError) {

            console.error("METADATA ERROR:", dbError);

            showBanner(document.getElementById("uploadBanner"), "error", SETUP_HINT);

            row.querySelector("small").innerText = "Upload failed (metadata)";

            return;

        }

        row.querySelector("small").innerText = formatSize(file.size) + " · done";

        const actions = document.createElement("div");

        const share = document.createElement("button");

        share.innerText = "Copy share link";

        share.onclick = (e) => copyText(shareLink(id), e.target);

        const direct = document.createElement("button");

        direct.innerText = "Copy direct link";

        direct.onclick = (e) => copyText(directLink(path), e.target);

        actions.append(share, direct);

        if (PICK_SID) {

            actions.append(makeUseButton(id, file.name, path));

        }

        row.appendChild(actions);

        loadRecent();

    }

    /* ======================================================
       RECENT UPLOADS
    ====================================================== */

    async function loadRecent() {

        const list = document.getElementById("recentList");

        let { data, error } = await db
            .from("cloud_files")
            .select("*")
            .order("created_at", { ascending: false })
            .limit(100);

        if (error) {

            console.error("RECENT ERROR:", error);

            list.innerHTML = `<p style="color:var(--text2)">${SETUP_HINT}</p>`;

            return;

        }

        /* per-account privacy: you only see YOUR uploads —
           managers (admins/chiefs) see everything. */

        if (!IS_MANAGER && ME.username) {

            data = (data || []).filter(f =>
                f.owner_username === ME.username);

        }

        data = (data || []).slice(0, 25);

        if (!data || data.length === 0) {

            list.innerHTML =
                `<p style="color:var(--text2)">Nothing here yet — upload something!</p>`;

            return;

        }

        list.innerHTML = "";

        data.forEach(f => {

            const row = document.createElement("div");

            row.className = "file-row";

            row.innerHTML = `
                <div class="meta">
                    <strong>${f.name}</strong>
                    <small>${formatSize(f.size)} · ${new Date(f.created_at).toLocaleString()}</small>
                </div>
            `;

            const share = document.createElement("button");

            share.innerText = "Share";

            share.onclick = (e) => copyText(shareLink(f.id), e.target);

            const direct = document.createElement("button");

            direct.innerText = "Download link";

            direct.onclick = (e) => copyText(downloadLink(f.id), e.target);

            const del = document.createElement("button");

            del.className = "danger";

            del.innerText = "Delete";

            del.onclick = async () => {

                await dbStorage.from(BUCKET).remove([f.path]);

                await db.from("cloud_files").delete().eq("id", f.id);

                loadRecent();

            };

            if (PICK_SID) {

                row.append(makeUseButton(f.id, f.name, f.path), share, direct);

            } else {

                row.append(share, direct, del);

            }

            list.appendChild(row);

        });

    }

    /* ======================================================
       WIRING
    ====================================================== */

    document.addEventListener("DOMContentLoaded", async () => {

        /* top banner + side rails + social bar (cloud only) */

        AdZone.mount();

        /* learn the current auth user id (for owner tagging) */

        try {

            const { data } = await db.auth.getUser();

            ME.authId = data?.user?.id || null;

        } catch (e) { /* not signed into Supabase Auth */ }

        const params = new URLSearchParams(location.search);

        /* supports ?f=ID, the bare ?=ID style, and
           ?=from<sessionId> which starts picker mode */

        const raw = params.get("f") || params.get("") || null;

        let fileId = null;

        if (raw && raw.startsWith("from")) {

            PICK_SID = raw;

        } else if (raw) {

            fileId = raw;

        }

        if (fileId) {

            openViewer(fileId);

        }

        /* same account as SHIBA PIMS — one login for both services */

        const loggedIn =
            localStorage.getItem("loggedIn") === "true" ||
            sessionStorage.getItem("loggedIn") === "true";

        const uploadCard = document.getElementById("uploadCard");

        const recentCard = document.getElementById("recentCard");

        if (!loggedIn) {

            /* visitors with a share link can view, but not upload */

            uploadCard.querySelector("#dropZone").style.display = "none";

            recentCard.style.display = "none";

            const banner = document.getElementById("uploadBanner");

            showBanner(banner, "info",
                "Shared links work without login. To upload files, sign in with your SHIBA PIMS account — one account for all SHIBA services.");

            banner.innerHTML +=
                '<div style="margin-top:12px"><button class="btn" id="pimsLogin">Login with PIMS account</button></div>';

            document.getElementById("pimsLogin").onclick = () => {

                /* OAuth-style login popup with its own session id */

                const sid = "from" + generateFileId() + generateFileId();

                window.__ssoSid = sid;

                window.open(
                    "../lapd/?=" + sid,
                    "shibaLogin",
                    "width=460,height=680,popup=yes");

            };

            /* the popup reports back here after login */

            window.addEventListener("message", (e) => {

                if (e.origin !== location.origin) return;

                if (e.data?.type !== "shiba-sso") return;

                if (e.data.sid !== window.__ssoSid) return;

                location.reload();

            });

            return;

        }

        const who =
            localStorage.getItem("username") ||
            sessionStorage.getItem("username") || "officer";

        if (PICK_SID) {

            showBanner(document.getElementById("uploadBanner"), "info",
                "Picking a photo for SHIBA PIMS — upload a new file or press Use on an existing one.");

        } else {

            showBanner(document.getElementById("uploadBanner"), "info",
                "Logged in as " + who +
                " (SHIBA PIMS account) — anyone with a share link can view the file.");

        }

        const dropZone = document.getElementById("dropZone");

        const fileInput = document.getElementById("fileInput");

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = () => {

            [...fileInput.files].forEach(uploadFile);

            fileInput.value = "";

        };

        dropZone.ondragover = (e) => {

            e.preventDefault();

            dropZone.classList.add("dragover");

        };

        dropZone.ondragleave = () => dropZone.classList.remove("dragover");

        dropZone.ondrop = (e) => {

            e.preventDefault();

            dropZone.classList.remove("dragover");

            [...e.dataTransfer.files].forEach(uploadFile);

        };

        loadRecent();

    });

    </script>

</body>

</html>
